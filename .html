<!-- ===== ADD ENTITY PANEL ===== -->
<div class="panel-overlay" *ngIf="showAddEntityModal" (click)="closeModal()"></div>
<div class="panel-container" [class.open]="showAddEntityModal">

  <div class="panel-header">
    <span class="panel-title">Add Entity</span>
    <button class="panel-close-btn" (click)="closeModal()">✕</button>
  </div>

  <div class="panel-content">
    <div class="form-group">
      <label class="fluent-label">Entity Name *</label>
      <input class="fluent-input" type="text" [(ngModel)]="newEntity.name" />
    </div>

    <div class="form-group">
      <label class="fluent-label">PE ID</label>
      <input class="fluent-input" type="text" [(ngModel)]="newEntity.peId" />
    </div>

    <div class="form-group">
      <label class="fluent-label">Identity Type</label>
      <select class="fluent-input fluent-select" [(ngModel)]="newEntity.identityType">
        <option *ngFor="let type of identityTypes" [value]="type">{{ type }}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="fluent-label">Identifier</label>
      <input class="fluent-input" type="text" [(ngModel)]="newEntity.identity" />
    </div>

    <div class="form-group form-group--checkbox">
      <input type="checkbox" [(ngModel)]="newEntity.isParent" id="isParent" />
      <label class="fluent-label" for="isParent">Mark this entity as parent</label>
    </div>

    <div class="form-group">
      <label class="fluent-label">Document Display Name</label>
      <input class="fluent-input" type="text" />
    </div>

    <div class="form-group">
      <label class="fluent-label">PDF Upload</label>
      <input type="file" />
    </div>
  </div>

  <div class="panel-footer">
    <button class="fluent-btn primary-btn" (click)="saveEntity()">Add & Save</button>
    <button class="fluent-btn default-btn" (click)="resetNewEntity()">Reset</button>
  </div>
</div>


<!-- ===== DQI PANEL ===== -->
<div class="panel-overlay" *ngIf="showDQIModal" (click)="closeModal()"></div>
<div class="panel-container" [class.open]="showDQIModal">

  <div class="panel-header">
    <span class="panel-title">Mark Entity as DQI</span>
    <button class="panel-close-btn" (click)="closeModal()">✕</button>
  </div>

  <div class="panel-content">
    <div class="form-group">
      <label class="fluent-label">Rationale</label>
      <textarea class="fluent-input fluent-textarea" rows="4" [(ngModel)]="dqiReason"></textarea>
    </div>

    <div class="form-group">
      <label class="fluent-label">Evidence Display Name</label>
      <input class="fluent-input" type="text" />
    </div>

    <div class="form-group">
      <label class="fluent-label">PDF Upload</label>
      <input type="file" />
    </div>
  </div>

  <div class="panel-footer">
    <button class="fluent-btn primary-btn" (click)="submitDQI()">Submit DQI</button>
    <button class="fluent-btn default-btn" (click)="resetDQI()">Reset</button>
  </div>
</div>
